name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      build_name: ${{ steps.version.outputs.build_name }}
      build_number: ${{ steps.version.outputs.build_number }}
      full_version: ${{ steps.version.outputs.full_version }}
    steps:
      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match required format vX.Y.Z+N"
            exit 1
          fi
          echo "build_name=${TAG%+*}" >> "$GITHUB_OUTPUT"
          echo "build_number=${TAG##*+}" >> "$GITHUB_OUTPUT"
          echo "full_version=$TAG" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build libgtk-3-dev cmake pkg-config clang liblzma-dev \
            libsecret-1-dev libjsoncpp-dev \
            file

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: mise run generate

      - name: Build Linux release bundle
        env:
          DRIVE_DESKTOP_CLIENT_ID: ${{ secrets.DRIVE_DESKTOP_CLIENT_ID }}
          DRIVE_DESKTOP_CLIENT_SECRET: ${{ secrets.DRIVE_DESKTOP_CLIENT_SECRET }}
        run: |
          flutter build linux --release \
            --build-name="${{ needs.resolve-version.outputs.build_name }}" \
            --build-number="${{ needs.resolve-version.outputs.build_number }}" \
            --dart-define=DRIVE_DESKTOP_CLIENT_ID="$DRIVE_DESKTOP_CLIENT_ID" \
            --dart-define=DRIVE_DESKTOP_CLIENT_SECRET="$DRIVE_DESKTOP_CLIENT_SECRET"

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          ln -s usr/bin/turtle_base AppDir/AppRun
          cp .github/workflows/turtle-base.desktop AppDir/turtle-base.desktop
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png AppDir/turtle-base.png

      - name: Build AppImage
        run: |
          wget -q -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run AppDir \
            "turtle-base-${{ needs.resolve-version.outputs.full_version }}-linux-x86_64.AppImage"

      - uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: turtle-base-*.AppImage
          if-no-files-found: error

  build-android:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: mise run generate

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ vars.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/release.keystore
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build Android release APK
        env:
          DRIVE_ANDROID_SERVER_CLIENT_ID: ${{ secrets.DRIVE_ANDROID_SERVER_CLIENT_ID }}
        run: |
          flutter build apk --release \
            --build-name="${{ needs.resolve-version.outputs.build_name }}" \
            --build-number="${{ needs.resolve-version.outputs.build_number }}" \
            --dart-define=DRIVE_ANDROID_SERVER_CLIENT_ID="$DRIVE_ANDROID_SERVER_CLIENT_ID"

      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-macos:
    needs: resolve-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: mise run generate

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo -n "$MACOS_CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build macOS release bundle
        env:
          DRIVE_DESKTOP_CLIENT_ID: ${{ secrets.DRIVE_DESKTOP_CLIENT_ID }}
          DRIVE_DESKTOP_CLIENT_SECRET: ${{ secrets.DRIVE_DESKTOP_CLIENT_SECRET }}
        run: |
          flutter build macos --release \
            --build-name="${{ needs.resolve-version.outputs.build_name }}" \
            --build-number="${{ needs.resolve-version.outputs.build_number }}" \
            --dart-define=DRIVE_DESKTOP_CLIENT_ID="$DRIVE_DESKTOP_CLIENT_ID" \
            --dart-define=DRIVE_DESKTOP_CLIENT_SECRET="$DRIVE_DESKTOP_CLIENT_SECRET"

      - name: Zip app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "build/macos/Build/Products/Release/turtle_base.app" \
            "turtle-base-${{ needs.resolve-version.outputs.full_version }}-macos.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-app
          path: turtle-base-*.zip
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true

  release:
    needs: [resolve-version, build-linux, build-android, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: linux-appimage
          path: artifacts

      - uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: artifacts

      - uses: actions/download-artifact@v8
        with:
          name: macos-app
          path: artifacts

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.resolve-version.outputs.full_version }}
        run: |
          mv "artifacts/app-release.apk" "artifacts/turtle-base-${VERSION}-android.apk"
          gh release create "${{ github.ref_name }}" \
            "artifacts/turtle-base-${VERSION}-linux-x86_64.AppImage" \
            "artifacts/turtle-base-${VERSION}-android.apk" \
            "artifacts/turtle-base-${VERSION}-macos.zip" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --prerelease
